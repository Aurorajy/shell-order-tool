name: 打包 Windows exe

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: |
          pip install pandas openpyxl pyinstaller

      - name: 打包 exe
        run: |
          pyinstaller --onefile --console --name 壳牌订单调度工具 order_merge.py

      - name: 上传 exe
        uses: actions/upload-artifact@v4
        with:
          name: 壳牌订单调度工具
          path: dist/壳牌订单调度工具.exe
