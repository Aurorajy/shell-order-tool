name: 打包 Windows exe

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 验证 selenium 已安装
        run: python -c "import selenium; print('selenium version:', selenium.__version__)"

      - name: 打包 exe（onedir 模式）
        run: |
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          pyinstaller --onedir --console --name 壳牌订单调度工具 --collect-all selenium run_all.py

      - name: 打包为 zip
        run: Compress-Archive -Path dist\壳牌订单调度工具 -DestinationPath dist\壳牌订单调度工具.zip

      - name: 上传 zip
        uses: actions/upload-artifact@v4
        with:
          name: 壳牌订单调度工具
          path: dist/壳牌订单调度工具.zip
